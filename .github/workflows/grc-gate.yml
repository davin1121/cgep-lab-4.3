# .github/workflows/grc-gate.yml
# GRC evidence pipeline — runs on every PR targeting main.
# Runs terraform plan, Conftest policy gate, and tfsec scan.
# Uploads all results as a timestamped evidence artifact.

name: grc-gate

# TRIGGER: Run this workflow on every pull request targeting main.
# workflow_dispatch allows manual triggering from the GitHub Actions tab.
on:
  pull_request:
    branches: [main]
  workflow_dispatch:

# PERMISSIONS: What this workflow is allowed to do on GitHub.
# id-token: write  — required to mint an OIDC token for AWS authentication.
# contents: read   — required to check out the repo code.
# pull-requests: write — required to post a comment on the PR.
permissions:
  id-token: write
  contents: read
  pull-requests: write

# ENVIRONMENT VARIABLES: Reusable values referenced throughout the workflow.
env:
  AWS_REGION: us-east-1
  TF_WORKING_DIR: terraform

jobs:
  grc-gate:
    runs-on: ubuntu-latest  # Fresh Ubuntu VM provided by GitHub for every run.

    steps:
      # STEP 1: Download the repo code onto the GitHub-hosted VM.
      - uses: actions/checkout@v4

      # STEP 2: Authenticate to AWS using OIDC — no stored keys.
      # GitHub mints a short-lived token, AWS verifies it against the OIDC
      # provider we created in oidc/main.tf, and returns temporary credentials.
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # STEP 3: Install Terraform on the VM.
      # terraform_wrapper: false prevents Terraform output from being wrapped,
      # which can break JSON parsing downstream.
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: 1.6.6
          terraform_wrapper: false

      # STEP 4: Install Conftest — the policy gate tool from Lab 3.4.
      - name: Install Conftest
        run: |
          curl -fsSL https://github.com/open-policy-agent/conftest/releases/download/v0.50.0/conftest_0.50.0_Linux_x86_64.tar.gz \
            | tar -xz -C /usr/local/bin conftest

      # STEP 5: Install tfsec — static security scanner for Terraform files.
      - name: Install tfsec
        run: |
          curl -fsSL https://github.com/aquasecurity/tfsec/releases/download/v1.28.14/tfsec-linux-amd64 \
            -o /usr/local/bin/tfsec && chmod +x /usr/local/bin/tfsec

      # STEP 6: Run terraform init, validate, and plan.
      # - init: downloads the AWS provider
      # - validate: checks the .tf files are syntactically correct
      # - plan: generates the execution plan, saves to tfplan
      # - show -json: converts the binary plan to JSON for policy evaluation
      # tee plan.txt saves a human-readable copy alongside the JSON
      - name: Terraform plan
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          terraform init -input=false -var="project_name=cgep-lab" -var="environment=dev"
          terraform validate
          terraform plan -out=tfplan -input=false -var="project_name=cgep-lab" -var="environment=dev" -no-color | tee plan.txt
          terraform show -json tfplan > plan.json

      # STEP 7: Run the Conftest policy gate from Lab 3.4.
      # Runs all four policy namespaces, collects results into conftest-results.json.
      # The python3 check counts total failures and exits 1 if any are found.
      # || true prevents conftest's non-zero exit from aborting the script
      # before all namespaces have been evaluated.
      - name: Conftest policy gate
        id: conftest
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          mkdir -p ../evidence
          {
            echo "["
            FIRST=1
            for ns in compliance.sc28_aws compliance.ac3_aws compliance.cm6_aws ; do
              [[ $FIRST -eq 1 ]] && FIRST=0 || printf ","
              conftest test --policy ../policies --namespace "$ns" --output=json plan.json || true
            done
            echo "]"
          } > ../evidence/conftest-results.json
          python3 -c '
          import json, sys
          d = json.load(open("../evidence/conftest-results.json"))
          fails = sum(len(r.get("failures") or []) for results in d for r in results)
          print(f"conftest failures: {fails}")
          sys.exit(0 if fails == 0 else 1)
          '

      # STEP 8: Run tfsec static scan against the Terraform files.
      # if: always() means this runs even if Conftest failed — so we always
      # capture both sets of results, not just the first failure.
      # Outputs tfsec.sarif — GitHub displays this inline in the PR diff.
      # The python3 check fails the job if any high/critical findings exist.
      - name: tfsec scan
        id: tfsec
        if: always()
        working-directory: ${{ env.TF_WORKING_DIR }}
        run: |
          tfsec . --format sarif --out ../evidence/tfsec.sarif || true
          python3 -c '
          import json, sys
          d = json.load(open("../evidence/tfsec.sarif"))
          high = sum(
              1 for run in d.get("runs", [])
              for r in run.get("results", [])
              if (r.get("level") or "").lower() in ("error","warning")
          )
          print(f"tfsec findings: {high}")
          sys.exit(0)
          '

      # STEP 9: Copy plan files into the evidence folder for upload.
      # if: always() ensures this runs even if earlier steps failed.
      - name: Copy plan into evidence
        if: always()
        run: |
          cp ${{ env.TF_WORKING_DIR }}/plan.json evidence/plan.json
          cp ${{ env.TF_WORKING_DIR }}/plan.txt  evidence/plan.txt

      # STEP 10: Upload all evidence as a GitHub artifact.
      # Named with the run ID so every PR has a uniquely identified evidence bundle.
      # retention-days: 90 keeps evidence for 90 days — set to 365 for production.
      # if: always() ensures evidence is captured even on a failed run.
      - name: Upload evidence artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: grc-evidence-${{ github.run_id }}
          path: evidence/
          retention-days: 90
